name: Hivemind Quality Gate

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
    inputs:
      strict:
        description: "Run strict quality gate (fail on readiness/benchmark issues)"
        required: false
        default: "false"

jobs:
  hivemind-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure evaluation assets exist
        run: |
          npm run tradebot:generate-eval-suite
          npm run tradebot:init-eval-responses
          npm run tradebot:score-eval

      - name: Hivemind readiness (informational)
        if: ${{ github.event.inputs.strict != 'true' }}
        run: npm run hivemind:doctor

      - name: Benchmark trend check (informational)
        if: ${{ github.event.inputs.strict != 'true' }}
        run: npm run hivemind:benchmark

      - name: Strict quality gate
        if: ${{ github.event.inputs.strict == 'true' }}
        run: npm run hivemind:quality:strict

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hivemind-quality-artifacts
          path: |
            data/tradebot/eval-score.json
            data/tradebot/eval-history.jsonl
